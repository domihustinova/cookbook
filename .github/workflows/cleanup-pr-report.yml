name: Cleanup PR report

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    concurrency:
      group: a11y-pages-publish
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Delete PR report directory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf pr-${{ github.event.pull_request.number }}/ || true
          git diff --staged --quiet || (git commit -m "chore: remove a11y report for pr-${{ github.event.pull_request.number }}" && git push)
