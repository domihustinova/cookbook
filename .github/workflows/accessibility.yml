name: Accessibility

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: a11y-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  get-base-url:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - name: Wait for Vercel deployment
        id: url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          REPO="${{ github.repository }}"
          ENVIRONMENT=${{ (github.event_name == 'pull_request' || github.ref != 'refs/heads/main') && '"Preview"' || '"Production"' }}

          for i in $(seq 1 24); do
            DEPLOYMENT_ID=$(gh api "repos/${REPO}/deployments?sha=${SHA}&per_page=10" \
              --jq "[.[] | select(.environment | test(\"${ENVIRONMENT}\"; \"i\"))] | first | .id" 2>/dev/null)

            if [ "${DEPLOYMENT_ID}" != "null" ] && [ -n "${DEPLOYMENT_ID}" ]; then
              URL=$(gh api "repos/${REPO}/deployments/${DEPLOYMENT_ID}/statuses" \
                --jq '[.[] | select(.state == "success")] | first | .environment_url' 2>/dev/null)

              if [ "${URL}" != "null" ] && [ -n "${URL}" ]; then
                if [ "${{ github.ref }}" = "refs/heads/main" ] && [ -n "${PRODUCTION_URL}" ]; then
                  echo "url=${PRODUCTION_URL}" >> $GITHUB_OUTPUT
                  echo "Using production URL: ${PRODUCTION_URL}"
                else
                  echo "url=${URL}" >> $GITHUB_OUTPUT
                  echo "Found URL: ${URL}"
                fi
                exit 0
              fi
            fi

            echo "Attempt ${i}/24: waiting for Vercel deployment..."
            sleep 10
          done

          echo "Timed out waiting for Vercel deployment"
          exit 1

  test:
    needs: get-base-url
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run accessibility tests
        run: npm run pw:a11y
        env:
          BASE_URL: ${{ needs.get-base-url.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload public directory
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-public
          path: |
            public/data/
            public/reports/
          if-no-files-found: error
          retention-days: 7

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-traces
          path: test-results/
          retention-days: 7

  reducer:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download public directory
        uses: actions/download-artifact@v8
        with:
          name: a11y-public
          path: public/

      - name: Run reducer
        run: npm run reducer

      - name: Upload merged public directory
        uses: actions/upload-artifact@v7
        with:
          name: a11y-public-merged
          path: |
            public/data/
            public/reports/
          if-no-files-found: error
          retention-days: 7

  html-index:
    needs: reducer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Clear repo public directory
        run: rm -rf public/

      - name: Download merged public directory
        uses: actions/download-artifact@v8
        with:
          name: a11y-public-merged
          path: public/

      - name: Generate HTML index
        run: npm run htmlIndex

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report
          path: public/
          if-no-files-found: error
          retention-days: 7

  deploy-pages:
    needs: html-index
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: a11y-pages-publish
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download report
        uses: actions/download-artifact@v8
        with:
          name: a11y-report
          path: public/

      - name: Set deploy path
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "path=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "path=main" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: ${{ steps.deploy.outputs.path }}

      - name: Add report link to summary
        run: |
          {
            echo "### Accessibility Report"
            echo ""
            echo "- [Open report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ steps.deploy.outputs.path }}/)"
          } >> "$GITHUB_STEP_SUMMARY"
